version: "3.9"
services:
  tts-api:
    build: .
    container_name: tts-api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: tts-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
